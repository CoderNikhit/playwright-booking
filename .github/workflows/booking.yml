name: Daily Booking

on:
  schedule:
    # GitHub schedules are 5-minute granularity, so trigger at :55, :00, :05 around open.
    # CDT window (UTC-5): 11:55, 12:00, 12:05 UTC.
    - cron: '55 11 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '5 12 * * 1-5'
    # CST window (UTC-6): 12:55, 13:00, 13:05 UTC.
    - cron: '55 12 * * 1-5'
    - cron: '0 13 * * 1-5'
    - cron: '5 13 * * 1-5'
  workflow_dispatch:

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.local_time_gate.outputs.should_run }}

    steps:
      - name: Gate by America/Chicago 7:00 AM
        id: local_time_gate
        shell: bash
        run: |
          HOUR=$(TZ=America/Chicago date +%H)
          MINUTE=$(TZ=America/Chicago date +%M)
          DAY_OF_WEEK=$(TZ=America/Chicago date +%u)

          # Allow pre-open warmup and a short post-open window.
          IN_WINDOW=false
          if [[ "$HOUR" == "06" && "$MINUTE" -ge 55 ]]; then
            IN_WINDOW=true
          elif [[ "$HOUR" == "07" && "$MINUTE" -le 5 ]]; then
            IN_WINDOW=true
          fi

          if [[ "$IN_WINDOW" == "true" && "$DAY_OF_WEEK" -ge 1 && "$DAY_OF_WEEK" -le 5 ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Running booking job in local Chicago window ${HOUR}:${MINUTE}"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping run at local Chicago time ${HOUR}:${MINUTE}, day ${DAY_OF_WEEK}"
          fi

  book-court:
    needs: precheck
    if: needs.precheck.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node20-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run booking automation
        env:
          PLAYWRIGHT_HTML_OPEN: never
          BOOKING_USER_ID: ${{ secrets.BOOKING_USER_ID }}
          BOOKING_PASSWORD: ${{ secrets.BOOKING_PASSWORD }}
        shell: bash
        run: |
          NOW_EPOCH=$(TZ=America/Chicago date +%s)
          TARGET_EPOCH=$(TZ=America/Chicago date -d "$(TZ=America/Chicago date +%F) 07:00:00" +%s)

          if [[ "$NOW_EPOCH" -lt "$TARGET_EPOCH" ]]; then
            WAIT_SECONDS=$((TARGET_EPOCH - NOW_EPOCH))
            echo "Pre-open warmup: waiting ${WAIT_SECONDS}s until 07:00:00 America/Chicago"
            sleep "$WAIT_SECONDS"
          fi

          echo "Starting booking attempt at $(TZ=America/Chicago date +%F' '%T' America/Chicago')"
          npx playwright test tests/example.spec.ts --project=chromium --grep "@booking" --reporter=list --workers=1

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            *.png
