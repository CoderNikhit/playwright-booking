name: Daily Booking

on:
  schedule:
    # Trigger at both possible UTC offsets for 7:00 AM America/Chicago.
    - cron: '0 12 * * 1-5'
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.local_time_gate.outputs.should_run }}

    steps:
      - name: Gate by America/Chicago 7:00 AM
        id: local_time_gate
        shell: bash
        run: |
          HOUR=$(TZ=America/Chicago date +%H)
          MINUTE=$(TZ=America/Chicago date +%M)
          DAY_OF_WEEK=$(TZ=America/Chicago date +%u)
          if [[ "$HOUR" == "07" && "$MINUTE" == "00" && "$DAY_OF_WEEK" -ge 1 && "$DAY_OF_WEEK" -le 5 ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Running booking job at local Chicago weekday 07:00"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping run at local Chicago time ${HOUR}:${MINUTE}, day ${DAY_OF_WEEK}"
          fi

  book-court:
    needs: precheck
    if: needs.precheck.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run booking automation
        env:
          PLAYWRIGHT_HTML_OPEN: never
          BOOKING_USER_ID: ${{ secrets.BOOKING_USER_ID }}
          BOOKING_PASSWORD: ${{ secrets.BOOKING_PASSWORD }}
        run: npx playwright test tests/example.spec.ts --project=chromium --grep "@booking" --reporter=list --workers=1

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            *.png
